<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JEE Mock Test Simulator (AI + OCR)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://unpkg.com/tesseract.js@v4.0.1/dist/tesseract.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        nta: { blue: '#1e3a5f', light: '#2c5282', accent: '#3182ce', green: '#38a169', orange: '#dd6b20', red: '#e53e3e', purple: '#805ad5' }
                    },
                    fontFamily: { sans: ['Inter','sans-serif'], mono: ['Roboto Mono','monospace'] }
                }
            }
        }
    </script>
    <style>
        * { scrollbar-width: thin; scrollbar-color: #4a5568 #1a202c; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #1a202c; }
        ::-webkit-scrollbar-thumb { background: #4a5568; border-radius: 3px; }
        .question-grid-btn { transition: all 0.2s; position: relative; }
        .question-grid-btn.answered { background: linear-gradient(135deg, #38a169, #2f855a); color: white; }
        .question-grid-btn.not-answered { background: linear-gradient(135deg, #e53e3e, #c53030); color: white; }
        .question-grid-btn.review { background: linear-gradient(135deg, #805ad5, #6b46c1); color: white; }
        .question-grid-btn.current { box-shadow: 0 0 0 3px #fbbf24; }
        .option-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); border: 2px solid transparent; }
        .option-card.selected { border-color: #3182ce; background: rgba(49,130,206,0.1); }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #3182ce; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .glass-panel { background: rgba(255,255,255,0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.3); }
        .dark .glass-panel { background: rgba(15,23,42,0.8); border: 1px solid rgba(255,255,255,0.1); }
        .btn-primary { background: linear-gradient(135deg, #3182ce, #2c5282); transition: all 0.2s; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(49,130,206,0.4); }
    </style>
</head>
<body class="bg-gray-100 dark:bg-slate-900 text-gray-800 dark:text-gray-200 transition-colors duration-300 font-sans min-h-screen">

<!-- Setup Screen -->
<div id="setup-screen" class="min-h-screen flex items-center justify-center p-4">
    <div class="glass-panel rounded-2xl shadow-2xl p-8 max-w-2xl w-full">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold bg-gradient-to-r from-nta-blue to-nta-accent bg-clip-text text-transparent">JEE AI Exam Pro</h1>
            <p class="text-gray-500">Intelligent Paper Parsing & Simulation</p>
        </div>

        <div class="space-y-6">
            <div>
                <label class="block text-sm font-semibold mb-2">Gemini API Key</label>
                <input type="password" id="api-key" placeholder="Enter Gemini v1beta Key" class="w-full px-4 py-3 rounded-lg border dark:border-gray-600 bg-white dark:bg-slate-800 outline-none">
            </div>

            <div class="flex items-center justify-between p-4 bg-purple-50 dark:bg-purple-900/20 border border-purple-200 dark:border-purple-800 rounded-lg">
                <div>
                    <h4 class="text-sm font-bold text-purple-700 dark:text-purple-300">Enable PDF OCR</h4>
                    <p class="text-xs text-purple-600/70">Enable this for scanned/image PDFs.</p>
                </div>
                <button id="ocr-toggle-btn" class="relative w-12 h-6 bg-gray-300 dark:bg-gray-600 rounded-full transition-colors">
                    <span id="ocr-dot" class="absolute left-1 top-1 w-4 h-4 bg-white rounded-full transition-transform"></span>
                </button>
            </div>

            <div class="relative">
                <div class="border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-xl p-8 text-center cursor-pointer" id="drop-zone">
                    <input type="file" id="pdf-input" accept=".pdf" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                    <p class="text-sm text-gray-500" id="file-label">Drop JEE PDF here</p>
                </div>
            </div>

            <div id="upload-progress" class="hidden">
                <div class="flex items-center gap-3 mb-2">
                    <div class="loader"></div>
                    <span class="text-sm font-medium text-nta-accent" id="progress-text">Processing...</span>
                </div>
                <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-2">
                    <div id="progress-bar" class="bg-nta-accent h-2 rounded-full transition-all" style="width: 0%"></div>
                </div>
            </div>

            <button id="start-test" class="w-full btn-primary text-white font-semibold py-4 rounded-xl disabled:opacity-50" disabled>Start Exam</button>
        </div>
    </div>
</div>

<!-- Main Test Screen -->
<div id="test-screen" class="hidden min-h-screen flex flex-col">
    <header class="bg-white dark:bg-slate-800 border-b border-gray-200 dark:border-gray-700 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <h2 class="font-bold text-lg">JEE Mock Simulator</h2>
            <div class="bg-gray-100 dark:bg-slate-700 px-4 py-2 rounded-lg">
                <span id="timer" class="font-mono text-xl font-bold text-nta-blue dark:text-blue-400">03:00:00</span>
            </div>
        </div>
    </header>

    <div class="flex-1 flex max-w-7xl mx-auto w-full">
        <!-- Question Area -->
        <div class="flex-1 p-6 overflow-y-auto">
            <div class="bg-white dark:bg-slate-800 rounded-xl shadow-sm p-8 min-h-[500px]">
                <div class="flex justify-between mb-6 border-b pb-4">
                    <span class="bg-nta-blue text-white px-3 py-1 rounded font-bold">Q <span id="q-number">1</span></span>
                    <span id="q-status" class="text-sm text-gray-500 italic">Not Answered</span>
                </div>
                <div id="question-content" class="text-lg mb-8"></div>
                <div id="options-container" class="space-y-3"></div>
                
                <div class="flex gap-3 mt-10 pt-6 border-t">
                    <button id="btn-save-next" class="bg-nta-green text-white px-6 py-2 rounded font-bold">Save & Next</button>
                    <button id="btn-clear" class="border px-6 py-2 rounded">Clear</button>
                    <button id="btn-review" class="bg-nta-purple text-white px-6 py-2 rounded">Mark for Review</button>
                </div>
            </div>
        </div>

        <!-- Palette Area -->
        <div class="w-80 bg-white dark:bg-slate-800 border-l p-6">
            <h3 class="font-bold mb-4">Question Palette</h3>
            <div id="question-grid" class="grid grid-cols-5 gap-2 mb-8"></div>
            <button id="btn-submit" class="w-full bg-nta-red text-white py-3 rounded font-bold">Submit Exam</button>
        </div>
    </div>
</div>

<canvas id="ocr-canvas" style="display:none;"></canvas>

<script>
const state = {
    useOCR: false, questions: [], currentQuestion: 0, answers: {},
    visited: new Set(), markedReview: new Set(), timeLimit: 10800000 
};

// UI Toggles
document.getElementById('ocr-toggle-btn').onclick = () => {
    state.useOCR = !state.useOCR;
    document.getElementById('ocr-toggle-btn').classList.toggle('bg-purple-600');
    document.getElementById('ocr-dot').classList.toggle('translate-x-6');
};

document.getElementById('pdf-input').onchange = e => handleFile(e.target.files[0]);

async function handleFile(file) {
    const key = document.getElementById('api-key').value;
    if(!key) return alert("API Key required");

    document.getElementById('upload-progress').classList.remove('hidden');
    const pdf = await pdfjsLib.getDocument(await file.arrayBuffer()).promise;
    let text = "";

    for(let i=1; i<=pdf.numPages; i++) {
        document.getElementById('progress-text').innerText = `Reading Page ${i}...`;
        const page = await pdf.getPage(i);
        if(state.useOCR) text += await doOCR(page);
        else text += (await page.getTextContent()).items.map(it => it.str).join(' ');
        document.getElementById('progress-bar').style.width = (i/pdf.numPages*50) + '%';
    }

    await parseWithAI(text, key);
}

async function doOCR(page) {
    const canvas = document.getElementById('ocr-canvas');
    const viewport = page.getViewport({scale: 2});
    canvas.width = viewport.width; canvas.height = viewport.height;
    await page.render({canvasContext: canvas.getContext('2d'), viewport}).promise;
    const res = await Tesseract.recognize(canvas, 'eng');
    return res.data.text;
}

async function parseWithAI(text, key) {
    document.getElementById('progress-text').innerText = "AI Structuring Questions...";
    const prompt = `Extract JEE Multiple Choice Questions into JSON array: [{"text":"...", "options":["...","...","...","..."], "correctAnswer":0}]. Text: ${text.substring(0, 30000)}`;
    
    try {
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`, {
            method: 'POST', body: JSON.stringify({contents: [{parts: [{text}]}]})
        });
        const data = await res.json();
        const raw = data.candidates[0].content.parts[0].text.replace(/```json|```/g, '');
        state.questions = JSON.parse(raw);
        document.getElementById('start-test').disabled = false;
        document.getElementById('progress-bar').style.width = '100%';
        document.getElementById('progress-text').innerText = "Ready!";
    } catch(e) { alert("AI Parsing Failed: Check API Key/Model"); }
}

function loadQuestion(idx) {
    state.currentQuestion = idx;
    state.visited.add(idx);
    const q = state.questions[idx];
    document.getElementById('q-number').innerText = idx + 1;
    document.getElementById('question-content').innerText = q.text;
    
    const cont = document.getElementById('options-container');
    cont.innerHTML = '';
    q.options.forEach((opt, i) => {
        const div = document.createElement('div');
        div.className = `option-card p-4 border rounded cursor-pointer ${state.answers[idx] === i ? 'selected' : ''}`;
        div.innerHTML = `<strong>${String.fromCharCode(65+i)}.</strong> ${opt}`;
        div.onclick = () => { state.answers[idx] = i; loadQuestion(idx); };
        cont.appendChild(div);
    });
    updateGrid();
}

function updateGrid() {
    const grid = document.getElementById('question-grid');
    grid.innerHTML = '';
    state.questions.forEach((_, i) => {
        const b = document.createElement('button');
        b.className = `question-grid-btn p-2 border rounded font-bold ${i === state.currentQuestion ? 'current' : ''}`;
        if(state.answers[i] !== undefined) b.classList.add('answered');
        else if(state.visited.has(i)) b.classList.add('not-answered');
        b.innerText = i + 1;
        b.onclick = () => loadQuestion(i);
        grid.appendChild(b);
    });
}

document.getElementById('start-test').onclick = () => {
    document.getElementById('setup-screen').classList.add('hidden');
    document.getElementById('test-screen').classList.remove('hidden');
    loadQuestion(0);
};

document.getElementById('btn-save-next').onclick = () => loadQuestion(state.currentQuestion + 1);
document.getElementById('btn-clear').onclick = () => { delete state.answers[state.currentQuestion]; loadQuestion(state.currentQuestion); };
</script>
</body>
</html>
